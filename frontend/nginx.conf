server {
    listen 5173;
    root /usr/share/nginx/html;
    index index.html;
 
    # Todas las rutas van al index.html (necesario para React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    # Proxy del frontend al backend para evitar CORS en producción
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
 